<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Prayer App</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2c3e50">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Prayers">

<link rel="apple-touch-icon" sizes="512x512" href="icon512.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon192.png">

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
height:100%;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#ddd;
}

body{
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
height:100vh;
background:#f9f9f9;
display:flex;
flex-direction:column;
}

.header{
background:#2c3e50;
padding:15px;
color:white;
text-align:center;
position:relative;
}

.settings-btn{
position:absolute;
left:12px;
top:12px;
font-size:22px;
cursor:pointer;
}

.welcome{
font-size:18px;
margin-bottom:10px;
}

.header input{
width:100%;
margin-top:10px;
padding:10px;
border-radius:8px;
border:none;
font-size:16px;
}

.screen{
flex:1;
overflow-y:auto;
padding:15px;
}

.hidden{
display:none;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:10px;
text-align:center;
background:#e0e0e0;
border-radius:8px;
cursor:pointer;
}

.tab.active{
background:#2c3e50;
color:white;
}

.prayer-item{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
font-size:18px;
cursor:pointer;
box-shadow:0 2px 4px rgba(0,0,0,.1);

display:flex;
justify-content:space-between;
align-items:center;
}

.prayer-item:active{
background:#eee;
}

.suggested{
border-left:6px solid #2c3e50;
}

.back-btn{
background:none;
border:none;
font-size:16px;
color:#2c3e50;
margin-bottom:10px;
cursor:pointer;
}

.favorite-btn{
background:none;
border:none;
font-size:24px;
cursor:pointer;
margin-bottom:10px;
}

.detail-image{
width:100%;
max-height:240px;
object-fit:cover;
border-radius:12px;
margin-bottom:15px;
display:none;
}

.detail-title{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
}

.detail-prayer{
font-size:17px;
line-height:1.7;
}

.detail-prayer p{
margin-bottom:18px;
}

.settings input{
width:100%;
padding:10px;
font-size:16px;
}

.heart-small{
font-size:20px;
}

.accordion{
margin-bottom:12px;
}

.accordion-btn{
width:100%;
padding:14px;
border:none;
background:#2c3e50;
color:white;
border-radius:10px;
text-align:left;
font-size:16px;
cursor:pointer;
}

.accordion-content{
display:none;
background:white;
padding:14px;
border-radius:0 0 10px 10px;
line-height:1.7;
box-shadow:0 2px 4px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="app">

<div class="header" id="listHeader">

<div class="settings-btn" id="settingsBtn">
⚙️
</div>

<div class="welcome" id="welcomeText"></div>

<input id="searchBar"
placeholder="Search prayers...">

</div>

<div class="screen" id="listScreen">

<div class="tabs">

<div class="tab active" id="allTab">
All
</div>

<div class="tab" id="favTab">
Favorites
</div>

</div>

<div id="list"></div>

</div>

<div class="screen hidden" id="settingsScreen">

<button class="back-btn" id="settingsBack">
← Back
</button>

<h3>Your Name</h3>

<input id="nameInput"
placeholder="Enter your name">

</div>

<div class="header hidden" id="detailHeader">
<h2>Prayer</h2>
</div>

<div class="screen hidden" id="detailScreen">

<button class="back-btn" id="backBtn">
← Back
</button>

<button class="favorite-btn" id="favBtn">
🤍
</button>

<img id="detailImage" class="detail-image">

<div class="detail-title" id="detailTitle"></div>

<div class="detail-prayer" id="detailPrayer"></div>

</div>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const prayers=[

{
title:"Morning Prayer",
image:"morning.png",
prayer:`
Dear Lord,

I do not know what will happen to me today —
I only know that nothing will happen
that was not foreseen by you.

I adore your holy plans
and submit to them with all my heart.

Amen.
`
},

{
title:"Day Prayer",
image:"day.png",
prayer:`
V. The Angel of the Lord declared unto Mary.

R. And she conceived of the Holy Spirit.

Hail Mary...

V. Behold the handmaid of the Lord.

R. Be it done unto me according to Your Word.

Hail Mary...

V. And the Word was made flesh.

R. And dwelt among us.

Hail Mary...

Amen.
`
},

{
title:"Evening Prayer",
image:"night.png",
prayer:`
God our Father,

Thank you for your love today.

Guard me through the night
and bring me safely to morning.

Amen.
`
},

{
title:"Our Father",
image:"jesus.png",
prayer:`
Our Father,
Who art in heaven,
hallowed be Thy name.

Thy kingdom come,
Thy will be done,
on earth as it is in heaven.

Give us this day our daily bread,
and forgive us our trespasses.

Amen.
`
},

{
title:"Hail Mary",
image:"mary.png",
prayer:`
Hail Mary,
full of grace,
the Lord is with thee.

Blessed art thou amongst women,
and blessed is the fruit of thy womb, Jesus.

Holy Mary,
Mother of God,
pray for us sinners,
now and at the hour of our death.

Amen.
`
},

{
title:"Glory Be",
image:"",
prayer:`
Glory be to the Father,
and to the Son,
and to the Holy Spirit.

As it was in the beginning,
is now,
and ever shall be,
world without end.

Amen.
`
},

{
title:"The Apostle's Creed",
image:"",
prayer:`
I believe in God,
the Father Almighty,
Creator of Heaven and earth.

And in Jesus Christ,
His only Son,
Our Lord.

Amen.
`
},

{
title:"The Nicene Creed",
image:"",
prayer:`
I believe in one God,
the Father Almighty,
Maker of heaven and earth,
of all things visible and invisible.

I believe in one Lord Jesus Christ,
the Only Begotten Son of God.

Amen.
`
},

{
title:"Saint Michael Prayer",
image:"",
prayer:`
Saint Michael the Archangel,
defend us in battle.

Be our protection against
the wickedness and snares of the devil.

May God rebuke him,
we humbly pray.

And do thou,
O Prince of the heavenly host,
by the power of God,
cast into hell Satan
and all evil spirits
who prowl throughout the world
seeking the ruin of souls.

Amen.
`
},

{
title:"Act of Contrition",
image:"",
prayer:`
O my God,

I am heartfully sorry
for having offended thee.

I firmly resolve,
with the help of thy grace,
to sin no more
and avoid the near occasion of sin.

Amen.
`
},

{
title:"Miraculous Medal Prayer",
image:"",
prayer:`
O Mary,
conceived without sin,

pray for us
who have recourse to thee.

Amen.
`
},

{
title:"Guardian Angel Prayer",
image:"",
prayer:`
Angel of God,
my guardian dear,

to whom God's love
commits me here.

Ever this day
be at my side,
to light and guard,
to rule and guide.

Amen.
`
},

{
title:"Prayer of Surrender",
image:"",
prayer:`
Lord Jesus Christ,

take all my freedom,
my understanding,
and my will.

All that I have
and cherish
you have given to me.

Amen.
`
},

{
title:"Grace Before Meals",
image:"",
prayer:`
Bless us,
O Lord,
and these thy gifts,

which we are about to receive
through Christ our Lord.

Amen.
`
},

{
title:"Grace After Meals",
image:"",
prayer:`
We give thee thanks
for all thy benefits,
O Almighty God.

May the souls
of the faithful departed,
through the mercy of God,
rest in peace.

Amen.
`
},

{
title:"Sign of the Cross",
image:"",
prayer:`
In the name of the Father,
and of the Son,
and of the Holy Spirit.

Amen.
`
},

{
title:"The Rosary",
image:"",
prayer:"Rosary"
},

{
title:"The Gloria",
image:"",
prayer:`
Glory to God in the highest.

And on earth peace
to people of good will.

We praise You.
We bless You.
We adore You.
We glorify You.

Amen.
`
},

{
title:"Prayer to Jesus",
image:"jesus.png",
prayer:`
Christ be with me,
Christ be beside me,
Christ be before me,
Christ be behind me.

Christ be at my right hand,
Christ be at my left hand.

Amen.
`
},

{
title:"Prayer to Mary",
image:"mary.png",
prayer:`
Mary,
mother of Jesus,

help me to live like Jesus,
and help me to live like you.

Amen.
`
},

{
title:"A Prayer",
image:"",
prayer:`
We have eyes to look and see.
We praise you,
we bless you,
we thank you.

We have hands to hold and make.
We praise you,
we bless you,
we thank you.

Amen.
`
},

{
title:"The 10 Commandments",
image:"",
prayer:`
1. I am the Lord thy God.
Thou shall not have strange gods before Me.

2. Thou shall not take the name
of the Lord thy God in vain.

3. Remember to keep holy
the Lord's day.

4. Honor thy father and mother.

5. Thou shall not kill.

6. Thou shall not commit adultery.

7. Thou shall not steal.

8. Thou shall not bear false witness.

9. Thou shall not covet thy neighbor's wife.

10. Thou shall not covet thy neighbor's goods.
`
},

{
title:"The Seven Sacraments",
image:"",
prayer:`
The Seven Sacraments:

• Baptism

• Confirmation

• Eucharist

• Penance

• Anointing of the Sick

• Matrimony

• Holy Orders
`
}

];

const listHeader=document.getElementById("listHeader");
const listScreen=document.getElementById("listScreen");

const detailHeader=document.getElementById("detailHeader");
const detailScreen=document.getElementById("detailScreen");

const settingsScreen=document.getElementById("settingsScreen");

const listEl=document.getElementById("list");

const searchBar=document.getElementById("searchBar");

const welcomeText=document.getElementById("welcomeText");

const nameInput=document.getElementById("nameInput");

const detailTitle=document.getElementById("detailTitle");

const detailPrayer=document.getElementById("detailPrayer");

const detailImage=document.getElementById("detailImage");

const favBtn=document.getElementById("favBtn");

let currentPrayer=null;

let currentTab="all";

let favorites=
JSON.parse(localStorage.getItem("favorites")||"[]");

let userName=
localStorage.getItem("userName")||"";

nameInput.value=userName;

function getTimeInfo(){

const h=new Date().getHours();

if(h<12){

return{
greet:"Good Morning",
prayer:"Morning Prayer"
};

}

if(h<18){

return{
greet:"How has your day been",
prayer:"Day Prayer"
};

}

return{
greet:"Good Evening",
prayer:"Evening Prayer"
};

}

function getSuggestedPrayer(){

const day=new Date().getDay();

if(day===0 || day===3){

return "The Rosary";

}

return getTimeInfo().prayer;

}

function updateWelcome(){

const t=getTimeInfo();

welcomeText.textContent=userName
? `${t.greet} ${userName}!`
: `${t.greet}!`;

}

function renderList(){

listEl.innerHTML="";

const search=
searchBar.value.toLowerCase();

const suggested=
getSuggestedPrayer();

prayers

.filter(p=>

p.title.toLowerCase().includes(search)

||

p.prayer.toLowerCase().includes(search)

)

.filter(p=>

currentTab==="all"

||

favorites.includes(p.title)

)

.forEach(p=>{

const div=document.createElement("div");

div.className="prayer-item";

if(p.title===suggested){

div.classList.add("suggested");

}

div.innerHTML=`

<span>${p.title}</span>

<span class="heart-small">
${favorites.includes(p.title) ? "❤️" : "🤍"}
</span>

`;

div.onclick=()=>openPrayer(p);

listEl.appendChild(div);

});

}

function openPrayer(prayer){

currentPrayer=prayer;

listHeader.classList.add("hidden");
listScreen.classList.add("hidden");

detailHeader.classList.remove("hidden");
detailScreen.classList.remove("hidden");

detailTitle.textContent=prayer.title;

if(prayer.title==="The Rosary"){

detailPrayer.innerHTML=`

<div class="accordion">

<button class="accordion-btn">
How to Begin
</button>

<div class="accordion-content">

Begin by holding the crucifix
and making the Sign of the Cross.

Pray the Apostles Creed.

On the first bead pray the Our Father.

Pray 3 Hail Marys.

Finish with the Glory Be.

</div>

</div>

<div class="accordion">

<button class="accordion-btn">
Joyful Mysteries
</button>

<div class="accordion-content">

• The Annunciation<br>
• The Visitation<br>
• The Nativity<br>
• The Presentation<br>
• The Finding in the Temple

</div>

</div>

<div class="accordion">

<button class="accordion-btn">
Sorrowful Mysteries
</button>

<div class="accordion-content">

• The Agony in the Garden<br>
• The Scourging at the Pillar<br>
• The Crowning with Thorns<br>
• The Carrying of the Cross<br>
• The Crucifixion

</div>

</div>

<div class="accordion">

<button class="accordion-btn">
Glorious Mysteries
</button>

<div class="accordion-content">

• The Resurrection<br>
• The Ascension<br>
• The Descent of the Holy Spirit<br>
• The Assumption<br>
• The Coronation of Mary

</div>

</div>

<div class="accordion">

<button class="accordion-btn">
Luminous Mysteries
</button>

<div class="accordion-content">

• Baptism of Jesus<br>
• Wedding at Cana<br>
• Proclamation of the Kingdom<br>
• The Transfiguration<br>
• Institution of the Eucharist

</div>

</div>

`;

document
.querySelectorAll(".accordion-btn")
.forEach(btn=>{

btn.onclick=()=>{

const content=
btn.nextElementSibling;

content.style.display=
content.style.display==="block"
? "none"
: "block";

};

});

}else{

detailPrayer.innerHTML=

prayer.prayer

.split(/\n\s*\n/)

.map(p=>`<p>${p.trim()}</p>`)

.join("");

}

if(prayer.image){

detailImage.src=prayer.image;

detailImage.style.display="block";

}else{

detailImage.style.display="none";

}

updateFavBtn();

}

function goBack(){

detailHeader.classList.add("hidden");
detailScreen.classList.add("hidden");

settingsScreen.classList.add("hidden");

listHeader.classList.remove("hidden");
listScreen.classList.remove("hidden");

}

function toggleFavorite(){

const t=currentPrayer.title;

favorites=favorites.includes(t)

? favorites.filter(f=>f!==t)

: [...favorites,t];

localStorage.setItem(
"favorites",
JSON.stringify(favorites)
);

updateFavBtn();

renderList();

}

function updateFavBtn(){

favBtn.textContent=

favorites.includes(currentPrayer.title)

? "❤️"

: "🤍";

}

document.getElementById("allTab").onclick=()=>{

currentTab="all";

document
.getElementById("allTab")
.classList.add("active");

document
.getElementById("favTab")
.classList.remove("active");

renderList();

};

document.getElementById("favTab").onclick=()=>{

currentTab="favorites";

document
.getElementById("favTab")
.classList.add("active");

document
.getElementById("allTab")
.classList.remove("active");

renderList();

};

document.getElementById("backBtn").onclick=
goBack;

document.getElementById("settingsBtn").onclick=()=>{

listScreen.classList.add("hidden");

settingsScreen.classList.remove("hidden");

};

document.getElementById("settingsBack").onclick=()=>{

userName=nameInput.value.trim();

localStorage.setItem(
"userName",
userName
);

updateWelcome();

goBack();

};

favBtn.onclick=toggleFavorite;

searchBar.oninput=renderList;

updateWelcome();

renderList();

});

</script>

<script>

if('serviceWorker' in navigator){

navigator.serviceWorker
.register('./sw.js')

.then(()=>console.log(
'Service Worker registered!'
))

.catch(err=>console.error(
'Service Worker registration failed:',
err
));

}

</script>

</body>
</html>
